# Rate limiting — must live in http context, not server context.
# Protects against brute-force and DoS on the API surface.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # ── React SPA ──────────────────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
    }

    # ── REST API proxy ─────────────────────────────────────────────────────────
    location /api/ {
        # Rate limit: burst of 30 allows short spikes; nodelay serves them immediately
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://volguard:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward auth header from browser to backend
        proxy_set_header X-Upstox-Token $http_x_upstox_token;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── WebSocket proxy ────────────────────────────────────────────────────────
    # Critical: proxy_read_timeout must be >= ALB idle timeout (3600s)
    # This prevents WebSocket connections from being silently killed
    location /api/ws/ {
        proxy_pass http://volguard:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Upstox-Token $http_x_upstox_token;

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;    # 1 hour — keeps WS alive all session
    }

    # ── FastAPI OpenAPI docs — LOCALHOST ONLY ──────────────────────────────────
    # /docs and /openapi.json expose the full API schema including all operation IDs,
    # request shapes, and auth requirements. Block for all non-loopback clients.
    # To access during development: ssh tunnel or use 127.0.0.1 directly.
    location /docs {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://volguard:8000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://volguard:8000;
        proxy_set_header Host $host;
    }
}
